name: Vibecrafted
options:
  bundleIdPrefix: io.vetcoders
targets:
  Vibecrafted:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Vibecrafted
    info:
      properties:
        LSUIElement: false
        CFBundleExecutable: Vibecrafted
        CFBundleDisplayName: Vibecrafted
        CFBundleName: Vibecrafted
        CFBundleIdentifier: io.vetcoders.vibecrafted
        NSPrincipalClass: NSApplication
    dependencies:
      - framework: ../../target/release/libshell_agent_ffi.dylib
        embed: true
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
    preBuildScripts:
      - name: "Build Rust FFI"
        script: |
          bash ${SRCROOT}/../scripts/build-rust.sh || true
