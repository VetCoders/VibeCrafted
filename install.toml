# Vibecrafted install manifest — consumed by the built-in vetcoders-installer
# under scripts/installer/.
#
#   make install                          (terminal wizard, the default)
#   make setup-dev                        (same meta-installer, advanced options)
#   make wizard                           (browser-based GUI, optional)
#   uv run --project scripts/installer vetcoders-installer install.toml --dry-run
#
# Copy is taken verbatim from the author's mocks in docs/installer/*.md.
# The installer's intro flow renders richer TTY screens when available. These
# four phases are the fallback and consent checkpoints for the shell path.

title = "⚒ Vibecrafted."
version_file = "VERSION"
log = "~/.vibecrafted/logs/installer/install-{ts}.log"

# Keep the installer tool around: vibecrafted ships `vibecrafted update`
# which re-runs this manifest, so the tool stays useful post-bootstrap.
persist = true


[[phase]]
key = "introduction"
label = "Introduction"
reason = """
We will install 𝚅𝚒𝚋𝚎𝚌𝚛𝚊𝚏𝚝𝚎𝚍. as a local-first framework for agent-assisted
development. This step is intentionally quiet: it names the product, the install
surface, and the fact that every durable write below has a reason.
"""
cmd = ["python3", "-c", "pass"]


[[phase]]
key = "diagnostics"
label = "Diagnostics and plan"
reason = """
We will inspect the current machine before changing files.

Required decision:
  Set your artifacts storage location.
  REASON: 𝚅𝚒𝚋𝚎𝚌𝚛𝚊𝚏𝚝𝚎𝚍. keeps the persistent artifacts on developer's hard disks
  for past session context retrieval. We make this location explicit so reports,
  transcripts, and run state can be inspected, moved, backed up, or deleted.
  Default: ${VIBECRAFTED_HOME:-$HOME/.vibecrafted}/artifacts

Installer options live in one place:
  runtime horse · shell helpers · skill views · dry-run or automation mode
"""
cmd = [
    "python3",
    "scripts/vetcoders_install.py",
    "list",
    "--source", ".",
]
optional = true


[[phase]]
key = "installation"
label = "Installation"
reason = """
We will install:
  - foundations: loctree, aicx, prview, screenscribe when needed
  - frontier agent configuration
  - shared skills, shell helpers, launchers, and mirrored agent views
  - the selected runtime horse when RUNTIME=... is provided
"""
cmd = [
    "bash",
    "-e",
    "-c",
    '''
bash scripts/install-foundations.sh
bash skills/vc-agents/scripts/install-frontier-config.sh --source "." || printf '[warn] Frontier config skipped (non-fatal)\n'
python3 scripts/vetcoders_install.py install --source "." --with-shell --compact --non-interactive --mirror
bash scripts/install-runtime.sh --runtime "${VIBECRAFTED_RUNTIME:-none}" --yes
''',
]


[[phase]]
key = "onboarding"
label = "Onboarding"
reason = """
We will run a final health check and leave the next useful commands visible:
doctor, update, uninstall, and the first project-level Vibecrafted entrypoint.
"""
cmd = [
    "python3",
    "scripts/vetcoders_install.py",
    "doctor",
]
optional = true

[branding]
header = "⚒ V A P O R C R A F T ⚒"
name = "Vibecrafted."
tagline = "The framework for making real products with agent CLIs."
footer_tagline = "You can Vibecraft your first project now!"
installer_cmd = "make install"

[intro]
screens = [
    "0_welcome_step.zsh.md",
    "1_Explain_step.zsh.md",
    "2_listing.zsh.md"
]
textual_screens = [
    "0_welcome_step.zsh.md",
    "1_Explain_step.zsh.md",
    "2_listing.zsh.md",
    "3_examine.zsh.md",
    "4_result.zsh.md",
    "5_installation.zsh.md"
]

[diagnostics]
categories = ["frameworks", "foundations", "toolchains", "agents", "additional_tools"]

[diagnostics.labels]
frameworks = "Frameworks"
foundations = "Foundations"
toolchains = "Toolchains"
agents = "Agents"
additional_tools = "Additional tools"

[diagnostics.commands]
foundations = ["loctree-mcp", "aicx-mcp", "prview", "screenscribe"]
toolchains = ["python3", "node", "git", "rsync"]
agents = ["claude", "codex", "gemini", "agy", "junie", "grok"]
additional_tools = ["mise", "starship", "atuin", "zoxide"]

[diagnostics.paths]
store_dir = "$VIBECRAFTED_ROOT/.vibecrafted/skills"
helpers = "$XDG_CONFIG_HOME/vetcoders/vc-skills.sh"
binaries = ["vibecraft", "vibecrafted"]
symlinks = ["$HOME/.agents", "$HOME/.claude", "$HOME/.codex", "$HOME/.gemini", "$HOME/.agy", "$HOME/.junie", "$HOME/.grok"]

[runtime]
default = "none"
available = ["wezterm", "vc-apprt", "locterm", "microsandbox"]

[runtime.picking.research]
default_agents = ["claude", "codex", "junie"]
fallback_agents = ["claude", "codex", "agy"]
reason = "Research needs three reliable independent workers. Junie is the default third researcher while agy remains available but non-default until its prompt contract is proven stable."

[runtime.horses.wezterm]
label = "WezTerm"
source = "$HOME/Libraxis/vc-runtime/wezterm"
lab = "$HOME/Libraxis/vc-runtime/labs/wezterm-spine"
platforms = ["macos", "linux", "wsl"]
artifacts = ["wezterm", "$XDG_CONFIG_HOME/wezterm/vibecrafted"]

[runtime.horses.vc-apprt]
label = "vc-apprt"
source = "$HOME/Libraxis/vc-runtime/vc_"
lab = "$HOME/Libraxis/vc-runtime/labs/vc-apprt-spine"
platforms = ["macos", "linux"]
artifacts = ["vc_"]
requires = ["zig 0.16"]

[runtime.horses.locterm]
label = "locterm"
source = "$HOME/Libraxis/vc-runtime/locterm"
lab = "$HOME/Libraxis/vc-runtime/labs/locterm-spine"
platforms = ["macos"]
artifacts = ["locterm.app", "iTerm2 AutoLaunch vc_launcher.py"]

[runtime.horses.microsandbox]
label = "microsandbox"
source = "$HOME/Libraxis/vc-runtime/experimental/microsandbox"
lab = "$HOME/Libraxis/vc-runtime/labs/microsandbox-execution"
platforms = ["macos", "linux"]
artifacts = ["msb", "msbserver"]
requires = ["krunvm", "libkrun"]
