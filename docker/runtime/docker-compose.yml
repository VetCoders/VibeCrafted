# 𝚅𝚒𝚋𝚎𝚌𝚛𝚊𝚏𝚝𝚎𝚍. Runtime Stack — for dragon (or any tailnet host)
#
# Two services:
#   - tailscale: official sidecar; owns the network namespace; advertises
#                this node into the tailnet with TS_HOSTNAME.
#   - vibecrafted-runtime: the full runtime image; shares tailscale's
#                netns (`network_mode: service:tailscale`) so its sshd
#                listens on the tailnet interface.
#
# Bring up:
#   cp tailscale.env.example .env   # fill in TS_AUTHKEY at minimum
#   docker compose -f docker/runtime/docker-compose.yml up -d
#
# Access (from any tailnet device, e.g. div0):
#   tailscale ssh runtime-dragon
#   # then inside:
#   vibecrafted doctor
#   loctree --version
#   aicx --version
#
# Tear down:
#   docker compose -f docker/runtime/docker-compose.yml down
#   # state volumes survive; add -v to also remove them.

name: vibecrafted-runtime

services:
  tailscale:
    image: tailscale/tailscale:stable
    container_name: vibecrafted-tailscale
    hostname: ${TS_HOSTNAME:-runtime-dragon}
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:?TS_AUTHKEY missing — see tailscale.env.example}
      TS_HOSTNAME: ${TS_HOSTNAME:-runtime-dragon}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_ACCEPT_DNS: "true"
      # --ssh enables Tailscale SSH (no per-user keys needed; tailnet ACL gates access).
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:---ssh}
    volumes:
      - tailscale-state:/var/lib/tailscale
    healthcheck:
      test: ["CMD", "tailscale", "status", "--peers=false", "--self=true"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  vibecrafted-runtime:
    build:
      context: ../..
      dockerfile: docker/runtime/Dockerfile
      args:
        VIBECRAFTED_BASE_IMAGE: ${VIBECRAFTED_BASE_IMAGE:-vibecrafted-base:local}
    image: ${VIBECRAFTED_RUNTIME_IMAGE:-vibecrafted-runtime:local}
    container_name: vibecrafted-runtime
    restart: unless-stopped
    depends_on:
      tailscale:
        condition: service_healthy
    # Share the sidecar's network namespace. Everything in this container
    # listens on the tailnet interface; nothing is exposed to the host or
    # the public internet.
    network_mode: "service:tailscale"
    environment:
      VIBECRAFTED_RUNTIME_FLAVOR: full
      VIBECRAFTED_DOCKER_SEED_SKILLS: "1"
      # Operator may override these per-deploy via .env.
      SSH_PORT: ${SSH_PORT:-22}
    volumes:
      # Persistent skill store, logs, reports, ssh keys for the vibecrafted
      # user — survives container rebuilds.
      - vibecrafted-home:/workspace/.vibecrafted
      # Optional: bind-mount a host workspace to operate on host files.
      # Comment out if pure containerized state is preferred.
      - ${VIBECRAFTED_HOST_WORKSPACE:-./workspace}:/workspace/host
    healthcheck:
      # `vibecrafted doctor` returns nonzero on broken foundations. Cheap
      # and meaningful — confirms skills are seeded and core deps load.
      test: ["CMD", "vibecrafted", "doctor"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s

volumes:
  tailscale-state:
    name: vibecrafted-tailscale-state
  vibecrafted-home:
    name: vibecrafted-home
